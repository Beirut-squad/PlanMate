name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

jobs:
  run-tests:
    name: Execute Tests & Generate Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Generate Coverage
        run: ./gradlew jacocoTestReport

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: build/reports/jacoco/
          retention-days: 1

      - name: Test Summary
        uses: test-summary/action@v2
        with:
          paths: "**/build/test-results/**/*.xml"
        if: always()

      - name: Verify coverage thresholds
        run: ./gradlew jacocoTestCoverageVerification

  analyze-pr:
    name: Analyze PR Code Coverage (Only Changed Files)
    needs: run-tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install diff-cover
        run: pip install diff-cover

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: jacoco-coverage-report
          path: build/reports/jacoco/

      - name: Compare coverage on changed files
        run: |
          diff-cover build/reports/jacoco/test/jacocoTestReport.xml \
            --compare-branch=origin/main \
            --html-report diffcover-report.html

      - name: Upload diffcover report
        uses: actions/upload-artifact@v4
        with:
          name: diff-coverage-report
          path: diffcover-report.html
